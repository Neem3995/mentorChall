<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Blog preview card</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main>
      <article class="blog-card">
        <img
          class="card-image"
          src="./assets/images/illustration-article.svg"
          alt="Abstract yellow and black illustration"
        />

        <div class="card-content">
          <span class="category">Learning</span>
          <p class="publish-date">Published 21 Dec 2023</p>
          <h1 class="card-title">
            <a href="#">HTML &amp; CSS foundations</a>
          </h1>

          <p class="card-description">
            These languages are the backbone of every website, defining
            structure, content, and presentation.
          </p>

          <div class="author">
            <img
              class="author-avatar"
              src="./assets/images/image-avatar.webp"
              alt="Greg Hooper"
            />

            <p class="author-name">Greg Hooper</p>
          </div>
        </div>
      </article>
    </main>

    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="https://github.com/Neem3995">Joseph Garcia</a>.
    </footer>
  </body>
</html>
